<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#0d1320"/>
      <stop offset="100%" stop-color="#05060a"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5bc8ff"/>
      <stop offset="100%" stop-color="#c8a24b"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- data sphere: latitude/longitude rings -->
  <g fill="none" stroke="url(#ring)" stroke-width="1.4" opacity="0.95">
    <circle cx="32" cy="32" r="16"/>
    <ellipse cx="32" cy="32" rx="7" ry="16"/>
    <ellipse cx="32" cy="32" rx="16" ry="7"/>
  </g>
  <!-- particle nodes -->
  <g fill="#5bc8ff">
    <circle cx="32" cy="16" r="1.8"/>
    <circle cx="48" cy="32" r="1.8"/>
    <circle cx="32" cy="48" r="1.8"/>
    <circle cx="16" cy="32" r="1.8"/>
  </g>
  <circle cx="32" cy="32" r="2.4" fill="#c8a24b"/>
</svg>
